name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality:
    name: TypeCheck + Lint + Unit Tests + Coverage + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://test.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-key' }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY || 'test-key' }}
      ZAI_BASE_URL: ${{ secrets.ZAI_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'test-key' }}
      # E2E test tokens (optional — tests skip gracefully if not set)
      E2E_TEST_ADMIN_TOKEN: ${{ secrets.E2E_TEST_ADMIN_TOKEN || '' }}
      E2E_TEST_USER_TOKEN: ${{ secrets.E2E_TEST_USER_TOKEN || '' }}
      E2E_TEST_STORE_ID: ${{ secrets.E2E_TEST_STORE_ID || 'test-store-00000000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then bun install --frozen-lockfile || npm ci; else npm ci; fi

      - name: TypeCheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests with coverage
        run: npx vitest run --coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://test.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-anon-key' }}
      E2E_TEST_ADMIN_TOKEN: ${{ secrets.E2E_TEST_ADMIN_TOKEN || '' }}
      E2E_TEST_USER_TOKEN: ${{ secrets.E2E_TEST_USER_TOKEN || '' }}
      E2E_TEST_STORE_ID: ${{ secrets.E2E_TEST_STORE_ID || 'test-store-00000000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: |
          if npm ls @playwright/test 2>/dev/null; then
            npx playwright install --with-deps chromium
          else
            echo "@playwright/test not installed — skipping E2E"
            exit 0
          fi

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Start server
        run: |
          npx next start -p 3000 &
          sleep 5
          curl -s http://localhost:3000 > /dev/null || exit 1

      - name: Run E2E tests
        run: npx playwright test --reporter=line
        env:
          CI: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns in source files (excluding node_modules, .env.example)
          if grep -r --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.next \
            -E "sb_secret_[a-zA-Z0-9_-]{20,}|sbp_[a-f0-9]{40,}" \
            src/ scripts/ 2>/dev/null; then
            echo "⚠️  Potential hardcoded secrets found!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi
