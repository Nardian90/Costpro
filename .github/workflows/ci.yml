name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality:
    name: TypeCheck + Lint + Unit Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://test.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-key' }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY || 'test-key' }}
      ZAI_BASE_URL: ${{ secrets.ZAI_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'test-key' }}
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeCheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test
        env:
          CI: true

      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=4096" bun run build

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://test.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-anon-key' }}
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      NEXTAUTH_URL: 'http://localhost:3000'
      NEXT_TELEMETRY_DISABLED: '1'
      E2E_TEST_ADMIN_TOKEN: ${{ secrets.E2E_TEST_ADMIN_TOKEN || '' }}
      E2E_TEST_USER_TOKEN: ${{ secrets.E2E_TEST_USER_TOKEN || '' }}
      E2E_TEST_STORE_ID: ${{ secrets.E2E_TEST_STORE_ID || 'test-store-00000000' }}
      E2E_TEST_USER_ID: ${{ secrets.E2E_TEST_USER_ID || '' }}
      E2E_BASE_URL: 'http://localhost:3000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: NODE_OPTIONS="--max-old-space-size=4096" bun run build

      - name: Start server
        run: |
          bunx next start -p 3000 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -s http://localhost:3000 > /dev/null || exit 1

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit 2>/dev/null || echo "Audit completed with warnings"
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          if grep -r --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=e2e \
            --exclude-dir=src/__tests__ \
            -E "sb_secret_[a-zA-Z0-9_-]{20,}|sbp_[a-f0-9]{40,}" \
            src/ 2>/dev/null; then
            echo "Potential hardcoded secrets found!"
            exit 1
          else
            echo "No hardcoded secrets detected"
          fi
