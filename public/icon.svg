<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="darkShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="12" dy="12" stdDeviation="15" flood-color="#c4c9d2" />
    </filter>
    <filter id="lightShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="-12" dy="-12" stdDeviation="15" flood-color="#ffffff" />
    </filter>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Base Background -->
  <rect x="0" y="0" width="512" height="512" fill="#e8ebf0" />

  <!-- Neumorphic Plate -->
  <rect x="64" y="64" width="384" height="384" rx="80" fill="#e8ebf0" filter="url(#darkShadow)" />
  <rect x="64" y="64" width="384" height="384" rx="80" fill="#e8ebf0" filter="url(#lightShadow)" />

  <!-- Lightning Arrow (Green Neon) -->
  <path d="M256 100 L350 240 L285 240 L320 400 L256 350 L192 400 L227 240 L162 240 Z" fill="#39FF14" filter="url(#neonGlow)" />
</svg>
