services:
  - type: web
    name: Costpro
    runtime: bun
    # FIX-DEPLOY (2026-07-10): buildCommand usa bun install + next build.
    # next build genera .next/standalone gracias a output: 'standalone' en next.config.ts
    buildCommand: bun install && bun run build
    # FIX-DEPLOY: startCommand debe usar 'bun server.ts' (NO 'bun run start')
    # porque 'start' script ejecuta 'next start' que NO incluye Socket.io.
    # El custom server (server.ts) levanta Next.js + Socket.io attached.
    startCommand: bun server.ts
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BUN_VERSION
        value: "1.3"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: ''
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ACCESS_TOKEN
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: ENABLE_DEV_BYPASS
        value: "false"
      - key: CSRF_ALLOWED_DOMAINS
        sync: false
      - key: ZAI_API_KEY
        sync: false
      - key: ZAI_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SENTRY_DSN
        sync: false
      - key: OTEL_ENABLED
        value: "false"
